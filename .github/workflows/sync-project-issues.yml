# ============================================================
# sync-project-issues.yml
#
# Idempotently creates or updates GitHub issues defined in
# .github/issue-plans/call-me-maybe/issues.yaml
#
# Trigger: workflow_dispatch (manual) from the Actions tab.
#
# Required repository permissions:
#   contents: read
#   issues:   write
#   metadata: read  (implicit on any GH token)
#
# Required secrets:
#   GITHUB_TOKEN — built-in, sufficient for same-repo issue management.
#   PROJECT_ISSUE_PAT — optional override (use only if default token lacks
#                       milestone-write permission due to org policy).
# ============================================================

name: Sync Project Issues

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: >
          Dry-run mode — print planned actions without creating or
          modifying any GitHub issues, labels, or milestones.
        type: boolean
        default: true
        required: false

      mode:
        description: >
          Sync mode:
            create — only create missing issues, never update existing ones.
            update — only update existing issues, never create new ones.
            sync   — create missing issues AND update existing ones (idempotent).
        type: choice
        options:
          - sync
          - create
          - update
        default: sync
        required: false

      include_bonus:
        description: >
          Include bonus issues (I11 and any others tagged bonus:true).
          Default false so they are omitted unless explicitly requested.
        type: boolean
        default: false
        required: false

      payload_path:
        description: >
          Path to the issue payload YAML file relative to repository root.
          Override only if you have moved the file.
        type: string
        default: .github/issue-plans/call-me-maybe/issues.yaml
        required: false

permissions:
  contents: read
  issues: write

jobs:
  sync-issues:
    name: "Sync Issues (${{ inputs.mode }}${{ inputs.dry_run == true && ' · dry-run' || '' }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout repository
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ----------------------------------------------------------------
      # 2. Set up Python (stdlib-only sync script — no pip install needed)
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ----------------------------------------------------------------
      # 3. Install PyYAML (only dependency for the sync script)
      # ----------------------------------------------------------------
      - name: Install PyYAML
        run: pip install --quiet "pyyaml>=6.0,<7.0"

      # ----------------------------------------------------------------
      # 4. Validate payload schema before touching any GitHub state
      # ----------------------------------------------------------------
      - name: Validate issue payload schema
        run: |
          python - <<'EOF'
          import sys
          from pathlib import Path
          sys.path.insert(0, ".github/scripts")
          from sync_issues import load_payload
          path = Path("${{ inputs.payload_path }}")
          if not path.exists():
              print(f"Error: payload file not found: {path}", file=sys.stderr)
              sys.exit(1)
          try:
              data = load_payload(path)
              print(f"✅ Payload valid — {len(data['issues'])} issues, {len(data['milestones'])} milestones")
          except ValueError as exc:
              print(f"❌ Payload validation failed:\n{exc}", file=sys.stderr)
              sys.exit(1)
          EOF

      # ----------------------------------------------------------------
      # 5. Print run parameters to job log for auditability
      # ----------------------------------------------------------------
      - name: Log run parameters
        run: |
          echo "### Run Parameters" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Parameter | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----------|-------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Mode | \`${{ inputs.mode }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry-run | \`${{ inputs.dry_run }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Include bonus | \`${{ inputs.include_bonus }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Payload path | \`${{ inputs.payload_path }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Repository | \`${{ github.repository }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Triggered by | \`${{ github.actor }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

      # ----------------------------------------------------------------
      # 6. Run the sync script
      #
      #    Uses GITHUB_TOKEN by default. If the org restricts milestone
      #    creation, set PROJECT_ISSUE_PAT as a repository secret and
      #    replace the token reference below.
      # ----------------------------------------------------------------
      - name: Sync project issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARGS=(
            --payload "${{ inputs.payload_path }}"
            --repo    "${{ github.repository }}"
            --token   "$GITHUB_TOKEN"
            --mode    "${{ inputs.mode }}"
          )

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi

          if [ "${{ inputs.include_bonus }}" = "true" ]; then
            ARGS+=(--include-bonus)
          fi

          python .github/scripts/sync_issues.py "${ARGS[@]}"

      # ----------------------------------------------------------------
      # 7. Surface outcome in the Actions summary (always runs, even on
      #    failure, so the summary is always populated)
      # ----------------------------------------------------------------
      - name: Append status to summary
        if: always()
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ job.status }}" = "success" ]; then
            echo "**Job status:** ✅ Success" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Job status:** ❌ Failed — check the logs above for details." >> "$GITHUB_STEP_SUMMARY"
          fi
