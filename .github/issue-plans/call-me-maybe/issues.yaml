      ## Problem Statement
      The pipeline is functional but brittle for real-world use: transient provider failures crash without recovery, logs are absent, and CLI UX is minimal. Structured logging, bounded retries, and ergonomic CLI input make the system production-usable.

      ## Scope
      **In scope:**
      - Structured logging with configurable verbosity (`--verbose` / `LOG_LEVEL` env)
      - Bounded exponential backoff retry for transient `LLMAdapterError` (not `ValidationError`)
      - Per-request and global timeout controls (from `Settings`)
      - CLI argument handling: `--input`, `--output`, `--verbose`, `--dry-run`
      - Tests for retry/timeout behavior and CLI argument validation

      **Out of scope:**
      - GUI or visual dashboard (future bonus extension)

      ## Technical Tasks
      - [ ] Add `structlog` (or `logging` with JSON formatter) to dependencies
      - [ ] Add log statements at each pipeline stage (INFO: stage name; DEBUG: raw I/O)
      - [ ] Implement `src/retry.py` with `retry_call(fn, *, max_retries, backoff_base)` ‚Äî retry on `LLMAdapterError` only
      - [ ] Integrate retry into adapter call in pipeline (max_retries from `Settings`)
      - [ ] Update `src/__main__.py` with `argparse` CLI: `--input PATH`, `--output PATH`, `--verbose`, `--dry-run`
      - [ ] Add `--dry-run` mode: parse + normalize + print schema without calling LLM
      - [ ] Add tests in `tests/unit/test_retry.py`: retry up to max, stop on success, don't retry validation errors
      - [ ] Add tests in `tests/unit/test_cli.py`: required args, unknown args, `--dry-run` output

      ## Acceptance Criteria
      - Logs are useful for debugging without leaking API keys or sensitive internals
      - Retry behavior is deterministic (bounded), and a success on retry 2 produces correct output
