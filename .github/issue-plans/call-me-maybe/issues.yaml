      ## Technical Tasks
      - [ ] Implement `src/pipeline.py` with `run(source: str | Path, *, config: Settings) -> FunctionCallResult`
      - [ ] Wire: `parse` ‚Üí `normalize` ‚Üí `adapter.call` ‚Üí `extract` ‚Üí `validate`
      - [ ] Ensure pipeline errors from any stage are re-raised as their typed exception (no bare `except Exception`)
      - [ ] Implement `src/output.py` with `serialize(result: FunctionCallResult) -> str` using `json.dumps` with `sort_keys=True, ensure_ascii=False`
