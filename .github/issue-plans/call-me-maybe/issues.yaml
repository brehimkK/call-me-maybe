    body: |
      <!-- fingerprint:call-me-maybe:I09 -->

      ## Problem Statement
      The project specification requires deterministic and reproducible behavior. All controllable randomness knobs must be pinned, serialization must be canonical, and the system must be verifiable to produce identical byte-level output for identical inputs.

      ## Scope
      **In scope:**
      - `Settings` config object with all determinism parameters
      - Canonical output serialization rules
      - Repeat-run reproducibility tests
      - Documentation of known determinism limits

      **Out of scope:**
      - Non-deterministic behaviors beyond the system's control (provider-side stochasticity when `seed` is unsupported)

      ## Technical Tasks
      - [ ] Implement `src/config.py` with `Settings` (Pydantic `BaseSettings`): `model`, `temperature=0.0`, `top_p=1.0`, `seed=42`, `timeout_seconds=30`, `max_retries=0`
      - [ ] Load `Settings` from environment variables with `CALL_ME_MAYBE_` prefix
      - [ ] Verify `temperature=0` and `seed` are passed to adapter in all code paths
      - [ ] Verify `json.dumps(sort_keys=True)` is used for all output serialization
      - [ ] Add reproducibility regression tests in `tests/unit/test_determinism.py`: run pipeline twice with same input (mocked adapter), assert outputs are byte-identical
      - [ ] Add `docs/determinism.md` documenting all controlled parameters and known limits

      ## Acceptance Criteria
      - Two consecutive runs with identical inputs and mocked adapter produce byte-identical output
      - `Settings` config is the single source of truth for all generation parameters
      - Determinism boundary (what is and isn't guaranteed) is documented

      ## Definition of Done
      - `src/config.py` committed
      - Reproducibility tests pass with `make test`
      - `docs/determinism.md` written

      ## Dependencies
      - **Blocked by:** I04, I05, I07, I08
      - **Blocks:** I10, I12, I13

      ## Milestone
      M3 - Validation, Determinism & Tests | **P0** | **M**

