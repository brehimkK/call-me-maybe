      <!-- fingerprint:call-me-maybe:I01 -->

      ## Problem Statement
      The current repository scaffold is incomplete for production development and repeatable execution. `pyproject.toml` is empty, `uv.lock` is empty, module files are stubs, and `Makefile` targets are partially broken.

      ## Scope
      **In scope:**
      - Canonical directory layout (`src/`, `tests/`, `data/`, `config/`)
      - Dependency management via `pyproject.toml` + `uv` lock file
      - Makefile targets aligned with actual dependency/install path and runtime entrypoint
      - Basic quality targets (`lint`, `test`) wired to existing toolchain

      **Out of scope:**
      - Core business logic implementation

      ## Technical Tasks
      - [ ] Finalize module layout (`src/call_me_maybe/`) and confirm `__main__.py` entrypoint
      - [ ] Populate `pyproject.toml` with project metadata and required dependencies
      - [ ] Regenerate `uv.lock` to match declared deps
      - [ ] Update `Makefile` `install` target to use `uv sync` and `run` to use `uv run python -m src`
      - [ ] Create `tests/` directory with `__init__.py` and `conftest.py` stubs
      - [ ] Create `data/input/` sample directory with example inputs
      - [ ] Add `make test` target wired to `pytest`
      - [ ] Verify `make install && make run` complete end-to-end on a clean checkout

      ## Acceptance Criteria
      - `make install` succeeds on a clean environment with no manual steps
      - `make run` executes the main entrypoint without errors (stub output acceptable)
      - `make test` discovers and runs test suite (zero tests OK at this stage, no collection errors)
      - Dependency graph is reproducibly installable from committed `pyproject.toml` + `uv.lock`

      ## Definition of Done
      - Foundation files committed and all Makefile targets pass
      - No broken imports or missing `__init__.py` barriers
      - Downstream issues (I02, I03, I14) have a stable base to build on

      ## Dependencies
      - **Blocked by:** none
      - **Blocks:** I02, I03, I14

