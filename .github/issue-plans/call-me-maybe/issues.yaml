      M1 - Foundation & Architecture | **P0** | **S**

  - id: I02
    title: "Define architecture contracts and error handling strategy"
    milestone: "M1 - Foundation & Architecture"
    priority: "P0"
    size: "M"
    bonus: false
    labels:
      - "type:feature"
      - "area:architecture"
      - "priority:P0"
      - "size:M"
      - "status:ready"
    blocked_by: ["I01"]
    blocks: ["I03", "I04", "I05", "I07", "I08"]
    body: |
      <!-- fingerprint:call-me-maybe:I02 -->

      ## Problem Statement
      Without explicit module contracts, implementations will drift, interfaces will be inconsistent, and error handling will be ad-hoc. Architecture decisions must be codified before any core module is built.

      ## Scope
      **In scope:**
      - Module boundary definitions and ownership map
      - Typed data contracts for inputs/outputs at each module interface
      - Typed error taxonomy and propagation policy
      - Logging/error surface policy (user-facing vs debug)

      **Out of scope:**
      - Full feature implementation

      ## Technical Tasks
      - [ ] Create `src/errors.py` ‚Äî define typed exception hierarchy: `CallMeMaybeError`, `InputParseError`, `SchemaError`, `LLMAdapterError`, `LLMTimeoutError`, `OutputParseError`, `ValidationError`
      - [ ] Create `src/models.py` ‚Äî define Pydantic models for `FunctionParameter`, `FunctionDefinition`, `ParsedInput`, `NormalizedSchema`, `RawLLMOutput`, `FunctionCallResult`
      - [ ] Create `docs/architecture.md` ‚Äî module map, data flow diagram (ASCII), and interface contracts
      - [ ] Define canonical field ordering policy for deterministic serialization
      - [ ] Define logging levels: `INFO` for pipeline stages, `DEBUG` for raw LLM I/O, `ERROR` for failures
      - [ ] Review existing `src/schema_manager.py` models against new contracts and align

      ## Acceptance Criteria
      - `src/errors.py` defines a complete exception hierarchy importable by all modules
      - `src/models.py` defines all inter-module data contracts as Pydantic models
      - `docs/architecture.md` documents module responsibilities with no unresolved interface gaps
      - All downstream issues reference these contracts without ambiguity

      ## Definition of Done
      - Contracts committed and reviewed
      - No `TODO` placeholders in `src/errors.py` or `src/models.py`
      - Architecture doc maps every module to its inputs, outputs, and error behavior

      ## Dependencies
      - **Blocked by:** I01
      - **Blocks:** I03, I04, I05, I07, I08

      ## Milestone
      M1 - Foundation & Architecture | **P0** | **M**

  - id: I03
    title: "Implement robust input loading and prompt/function parsing"
    milestone: "M2 - Core Function Calling Pipeline"
    priority: "P0"
    size: "M"
    bonus: false
    labels:
      - "type:feature"
      - "area:parser"
      - "priority:P0"
      - "size:M"
      - "status:ready"
    blocked_by: ["I02"]
    blocks: ["I04", "I08", "I10"]
    body: |
      <!-- fingerprint:call-me-maybe:I03 -->

      ## Problem Statement
      The pipeline needs safe ingestion of a user prompt and function definitions from file or string inputs with deterministic parsing behavior. Any malformed input must fail with a typed, actionable error ‚Äî not a raw Python exception.

      ## Scope
      **In scope:**
      - File and string input ingestion (JSON format)
      - Prompt extraction and function-definition list parsing
      - Malformed JSON detection and structured error emission
      - Missing top-level field detection
      - Output typed as `ParsedInput` from architecture contracts

      **Out of scope:**
      - Model invocation
      - Deep schema validation (belongs to I04/I07)

      ## Technical Tasks
      - [ ] Implement `src/parser.py` with `load_input(source: str | Path) -> ParsedInput`
      - [ ] Support both file path input and raw JSON string input
      - [ ] Detect and raise `InputParseError` for invalid JSON syntax
      - [ ] Detect and raise `InputParseError` for missing `prompt` or `functions` keys
      - [ ] Detect and raise `InputParseError` for wrong top-level types (e.g., `functions` not a list)
      - [ ] Add `data/input/example.json` with a valid sample input
      - [ ] Add unit tests in `tests/unit/test_parser.py` covering: valid input, malformed JSON, missing keys, wrong types

      ## Acceptance Criteria
      - Valid JSON input returns a fully populated `ParsedInput` object
      - Invalid/malformed inputs raise `InputParseError` with a message identifying the fault
      - Parser output is stable (same input ‚Üí same `ParsedInput`) across repeated runs
      - Unit tests pass for all scenarios listed

      ## Definition of Done
      - `src/parser.py` committed with all tasks complete
      - Unit tests pass with `make test`
      - Parser is integration-ready for I04/I08

      ## Dependencies
      - **Blocked by:** I02
      - **Blocks:** I04, I08, I10

      ## Milestone
      M2 - Core Function Calling Pipeline | **P0** | **M**

  - id: I04
    title: "Build schema normalization pipeline for function definitions"
    milestone: "M2 - Core Function Calling Pipeline"
    priority: "P0"
    size: "M"
    bonus: false
    labels:
      - "type:feature"
      - "area:validation"
      - "priority:P0"
      - "size:M"
      - "status:ready"
    blocked_by: ["I02", "I03"]
    blocks: ["I05", "I07", "I08", "I09"]
    body: |
      <!-- fingerprint:call-me-maybe:I04 -->

      ## Problem Statement
      Raw function definitions may vary in field ordering, optional field presence, and type notation. Normalization into a canonical internal form is required for stable downstream behavior in the LLM adapter and validator.

      ## Scope
      **In scope:**
      - Canonicalization of field ordering (alphabetical parameter keys, sorted function list)
      - Type-string normalization (e.g., `"int"` ‚Üí `"integer"`, `"str"` ‚Üí `"string"`)
      - Required/optional default handling
      - Explicit failure for unsupported schema constructs

      **Out of scope:**
      - Full JSON Schema validation enforcement (belongs to I07)

      ## Technical Tasks
      - [ ] Implement `src/normalizer.py` with `normalize(parsed: ParsedInput) -> NormalizedSchema`
      - [ ] Sort function list by name for deterministic ordering
      - [ ] Sort parameter keys alphabetically within each function
      - [ ] Normalize type strings to canonical set: `string`, `number`, `integer`, `boolean`, `array`, `object`, `null`
      - [ ] Raise `SchemaError` for unsupported types or structurally invalid function definitions
      - [ ] Add unit tests in `tests/unit/test_normalizer.py`: stable output across field-order variations, type normalization, unsupported type rejection

      ## Acceptance Criteria
      - Same semantic input (different field ordering) ‚Üí identical `NormalizedSchema` bytes when serialized
      - Unsupported type strings raise `SchemaError` with the offending type in the message
      - `NormalizedSchema` is directly consumable by LLM adapter and validator
      - Unit tests pass

      ## Definition of Done
      - `src/normalizer.py` committed and tests pass
      - Normalizer output matches `NormalizedSchema` contract from I02

      ## Dependencies
      - **Blocked by:** I02, I03
      - **Blocks:** I05, I07, I08, I09

      ## Milestone
      M2 - Core Function Calling Pipeline | **P0** | **M**

  - id: I05
    title: "Implement deterministic LLM client adapter with strict request controls"
    milestone: "M2 - Core Function Calling Pipeline"
    priority: "P0"
    size: "L"
    bonus: false
    labels:
      - "type:feature"
      - "area:llm"
      - "priority:P0"
      - "size:L"
      - "status:ready"
    blocked_by: ["I02", "I04"]
    blocks: ["I06", "I08", "I09", "I11"]
    body: |
      <!-- fingerprint:call-me-maybe:I05 -->

      ## Problem Statement
      Function selection and argument generation depend on the LLM. The adapter must enforce deterministic generation settings, handle timeouts, and return a structured raw output object ‚Äî isolating the rest of the pipeline from provider details.

      ## Scope
      **In scope:**
      - Provider-agnostic adapter `Protocol`/abstract base
      - Concrete OpenAI-compatible provider implementation
      - Deterministic generation parameter pinning (`temperature=0`, `top_p=1`, `seed` where supported)
      - Per-request timeout enforcement
      - Structured `RawLLMOutput` return type
      - Typed adapter errors (`LLMAdapterError`, `LLMTimeoutError`)

      **Out of scope:**
      - Semantic validation of returned argument values (belongs to I07)
      - Retry logic (belongs to I11)

      ## Technical Tasks
      - [ ] Define `LLMAdapter` Protocol in `src/llm_adapter.py` with `call(schema: NormalizedSchema, prompt: str) -> RawLLMOutput`
      - [ ] Implement `OpenAIAdapter` with pinned: `temperature=0`, `top_p=1`, `seed=42` (configurable), `timeout` from config
      - [ ] Load API key from environment variable (never hardcoded)
      - [ ] Set model name and version from `Settings` config object (not hardcoded)
      - [ ] Map provider HTTP errors and timeouts to `LLMAdapterError` / `LLMTimeoutError`
      - [ ] Capture sanitized raw response in `RawLLMOutput` (strip API key references from logs)
      - [ ] Add unit tests in `tests/unit/test_llm_adapter.py` using mock provider responses covering: success, timeout, auth error, malformed provider response

      ## Acceptance Criteria
      - Adapter accepts `NormalizedSchema` + prompt string and returns `RawLLMOutput`
      - Timeout and provider failures map to typed exceptions from the error taxonomy
      - `temperature=0` and `seed` are always applied ‚Äî no accidental non-determinism
      - Unit tests with mocked provider pass without real API calls

      ## Definition of Done
      - `src/llm_adapter.py` committed with deterministic config enforced
      - Mock-based unit tests pass
      - Adapter is orchestrator-ready for I08

      ## Dependencies
      - **Blocked by:** I02, I04
      - **Blocks:** I06, I08, I09, I11

      ## Milestone
      M2 - Core Function Calling Pipeline | **P0** | **L**

  - id: I06
    title: "Implement constrained output extraction and strict JSON parsing"
    milestone: "M2 - Core Function Calling Pipeline"
    priority: "P0"
    size: "M"
    bonus: false
    labels:
      - "type:feature"
      - "area:pipeline"
      - "priority:P0"
      - "size:M"
      - "status:ready"
    blocked_by: ["I05"]
    blocks: ["I07", "I08", "I10"]
    body: |
      <!-- fingerprint:call-me-maybe:I06 -->

      ## Problem Statement
      LLM output is text and can include markdown fences, preamble, trailing commentary, or multiple JSON objects. The extractor must reliably and deterministically extract exactly one valid JSON object from the raw output and reject everything else.

      ## Scope
      **In scope:**
      - Extraction of a single JSON object from raw LLM text output
      - Stripping of markdown code fences (` ```json ` ... ` ``` `)
      - Rejection of multi-object, empty, or ambiguous payloads
      - Deterministic `OutputParseError` for any non-conforming output

      **Out of scope:**
      - Schema/type validation of the extracted payload (belongs to I07)

      ## Technical Tasks
      - [ ] Implement `src/extractor.py` with `extract(raw: RawLLMOutput) -> dict`
      - [ ] Strip leading/trailing whitespace and markdown code fences before parse attempt
      - [ ] Use `json.loads` strictly ‚Äî no `eval`, no YAML fallback
      - [ ] Raise `OutputParseError` if: JSON is invalid, result is not a `dict`, output contains multiple top-level JSON objects
      - [ ] Add unit tests in `tests/unit/test_extractor.py` covering: clean JSON, JSON in markdown fence, trailing text, multiple objects, empty string, invalid unicode escape, non-dict JSON (list/string)

      ## Acceptance Criteria
      - Valid single JSON object returns a `dict`
      - Any non-conforming input raises `OutputParseError` with descriptive message
      - Extracted dict is directly passable to validator (I07)
      - All edge-case unit tests pass

      ## Definition of Done
      - `src/extractor.py` committed and tested against adversarial cases
      - Tests pass with `make test`

      ## Dependencies
      - **Blocked by:** I05
      - **Blocks:** I07, I08, I10

      ## Milestone
      M2 - Core Function Calling Pipeline | **P0** | **M**

  - id: I07
    title: "Implement validation engine for schema compliance and no hallucinated fields"
    milestone: "M3 - Validation, Determinism & Tests"
    priority: "P0"
    size: "L"
    bonus: false
    labels:
      - "type:feature"
      - "area:validation"
      - "priority:P0"
      - "size:L"
      - "status:ready"
    blocked_by: ["I02", "I04", "I06"]
    blocks: ["I08", "I09", "I10", "I13"]
    body: |
      <!-- fingerprint:call-me-maybe:I07 -->

      ## Problem Statement
      The core project requirement mandates that the output contains exactly the fields defined in the function schema ‚Äî no more, no less. The validator must enforce all constraints and produce machine-readable error reports.

      ## Scope
      **In scope:**
      - Function name existence check against known definitions
      - Required parameter presence validation
      - Parameter value type validation against normalized schema
      - `additionalProperties=false` enforcement (reject hallucinated parameters)
      - Forbidden top-level field detection
      - Machine-readable `ValidationError` with field path

      **Out of scope:**
      - Orchestration and retry logic

      ## Technical Tasks
      - [ ] Implement `src/validator.py` with `validate(payload: dict, schema: NormalizedSchema) -> FunctionCallResult`
      - [ ] Check `name` field exists and matches a known function in schema
      - [ ] Check all required parameters for the matched function are present in `parameters`
      - [ ] Check no unknown parameters exist in `parameters` beyond those in schema (`additionalProperties=false`)
      - [ ] Check each parameter value's Python type matches the normalized type string
      - [ ] Check no forbidden top-level keys exist beyond `prompt`, `name`, `parameters`
      - [ ] Return `ValidationError` with a list of `ValidationFailure(path, expected, got)` objects
      - [ ] Add unit tests in `tests/unit/test_validator.py`: valid payload, unknown function, missing required param, extra param, wrong type, extra top-level field

      ## Acceptance Criteria
      - Valid output passes and returns `FunctionCallResult`
      - Any hallucinated field (extra param or top-level field) causes `ValidationError`
      - `ValidationError` messages identify the exact failing path (e.g., `parameters.unknown_field`)
      - All unit test scenarios pass

      ## Definition of Done
      - `src/validator.py` committed and independently testable
      - Validator is orchestrator-ready for I08
      - Tests pass with `make test`

      ## Dependencies
      - **Blocked by:** I02, I04, I06
      - **Blocks:** I08, I09, I10, I13

      ## Milestone
      M3 - Validation, Determinism & Tests | **P0** | **L**

  - id: I08
    title: "Assemble end-to-end orchestration pipeline (load ‚Üí call ‚Üí validate ‚Üí output)"
