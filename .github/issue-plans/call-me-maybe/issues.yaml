      ## Problem Statement
      Issue setup and tracking should be reproducible and idempotent ‚Äî not a manual process that drifts over time. A GitHub Actions workflow must allow deterministic creation and updating of the full issue catalog from repo-managed payload files.

      ## Scope
      **In scope:**
      - `workflow_dispatch` pipeline with `dry_run`, `mode`, `include_bonus` inputs
      - Issue payload YAML file with full issue bodies and metadata
      - Idempotency check via hidden fingerprint in issue body (fallback: exact title match)
      - Create/update/sync modes
      - Label and milestone auto-creation and assignment
      - Dry-run mode (read-only, emits planned actions)
      - Summary report (created/updated/skipped/failed)

      **Out of scope:**
      - CI build/test/lint workflow logic

      ## Technical Tasks
      - [ ] Create `.github/issue-plans/call-me-maybe/issues.yaml` with full issue catalog
      - [ ] Create `.github/scripts/sync_issues.py` with idempotent sync logic
      - [ ] Create `.github/workflows/sync-project-issues.yml` with `workflow_dispatch` inputs
      - [ ] Implement fingerprint search (search issues API with fingerprint string)
      - [ ] Implement milestone resolution: create milestone if it doesn't exist, map by title
      - [ ] Implement label resolution: create labels if they don't exist
      - [ ] Emit GitHub Actions step summary table: created/updated/skipped/failed
      - [ ] Add `--dry-run` output to summary without mutating state
      - [ ] Validate payload schema before any API calls

      ## Acceptance Criteria
      - Dry-run mode lists all planned operations without mutating any GitHub state
      - Create/update/sync mode is idempotent: re-running produces no duplicates and updates existing issues
      - All labels and milestones are created if missing and assigned correctly
      - `include_bonus=false` skips I11 and any other bonus-tagged issues
      - Summary table is published to GitHub Actions job summary

      ## Definition of Done
      - Workflow is runnable from the GitHub Actions UI
      - Re-running the workflow in sync mode produces zero new issues (idempotent)
      - All 14 issues are created with correct labels, milestones, and bodies

