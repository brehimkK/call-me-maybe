      <!-- fingerprint:call-me-maybe:I08 -->

      ## Problem Statement
      Individual modules (parser, normalizer, adapter, extractor, validator) must be wired into a single deterministic execution path that accepts raw input, runs the pipeline, and emits the final schema-compliant function call output ‚Äî with clean error propagation at every stage.

      ## Scope
